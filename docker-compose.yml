services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_started
    volumes:
      - app_storage:/var/www/html/storage:ro

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env.docker
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=60
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: post_analytics
      MYSQL_USER: post_analytics
      MYSQL_PASSWORD: post_analytics_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "33060:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

volumes:
  app_storage:
  mysql_data:
  redis_data:
